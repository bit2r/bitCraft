project:
  output-dir: ../../docs/templates/typst-pdf

brand: ../../_brand.yml

format:
  typst:
    lang: ko
    # 한국어 어절 보호 (GOTCHA §6): 한글 포함 토큰만 box 로 묶어 어절 중간
    # 줄바꿈 방지. preamble 에 두어야 제목·초록·TOC·본문 전역에 적용된다
    # (본문 raw 블록에 두면 그 앞 frontmatter 에는 적용 안 됨).
    # ⚠ 전역 \S+ 는 수식 원자 간격까지 깨므로 한글 토큰([가-힣])만 대상.
    include-in-header:
      text: |
        #show regex("\S*[가-힣]\S*"): it => box(it)
    monofont: "D2Coding ligature"
    toc: true
    number-sections: true
    margin:
      x: 2.5cm
      y: 2.5cm
    fontsize: 11pt
    linestretch: 1.5
    columns: 1
